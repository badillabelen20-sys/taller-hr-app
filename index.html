<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TurboLub — Stock y Ventas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- ===== Pantalla de acceso ===== -->
  <div class="login" id="loginScreen">
    <div class="login-card">
      <img src="logo.png" alt="HR Turbos y Servicios" class="login-logo"
           onerror="this.style.display='none';document.getElementById('loginFb').style.display='block'">
      <div id="loginFb" class="login-fb" style="display:none">HR TURBOS Y SERVICIOS</div>
      <h2>Iniciar sesión</h2>
      <p>Ingresá con tu email y contraseña</p>
      <div class="field"><label>Email</label><input id="li-user" type="email" autocomplete="username" placeholder="tuemail@ejemplo.com"></div>
      <div class="field"><label>Contraseña</label><input id="li-pass" type="password" autocomplete="current-password" placeholder="contraseña"></div>
      <label class="remember"><input type="checkbox" id="li-remember" checked> Recordarme en este equipo</label>
      <div id="li-error" class="login-error hide"></div>
      <button class="btn primary" style="width:100%;justify-content:center;padding:12px" onclick="doLogin()">Ingresar</button>
      <p class="login-hint">Datos en la nube · acceso desde cualquier PC 🔒</p>
    </div>
  </div>

  <div class="app hide">
    <!-- ===== Sidebar ===== -->
    <aside class="sidebar">
      <div class="brand">
        <img src="logo.png" alt="HR Turbos y Servicios" class="brand-logo"
             onerror="this.style.display='none';document.getElementById('brandFb').style.display='flex'">
        <div id="brandFb" class="logo" style="display:none;width:38px;height:38px;margin:2px auto">HR</div>
      </div>

      <div class="nav-section">
        <div class="nav-label">PRINCIPAL</div>
        <button class="nav-item active" data-view="inicio" onclick="go('inicio')">
          <span class="ico"><svg viewBox="0 0 24 24"><path d="M3 10.8 12 3l9 7.8"/><path d="M5 9.6V21h5v-6h4v6h5V9.6"/></svg></span> Inicio</button>
        <button class="nav-item" data-view="ventas" onclick="go('ventas')">
          <span class="ico"><svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg></span> Ventas</button>
        <button class="nav-item" data-view="stock" onclick="go('stock')">
          <span class="ico"><svg viewBox="0 0 24 24"><path d="M21 8 12 3 3 8v8l9 5 9-5z"/><path d="M3 8l9 5 9-5"/><path d="M12 13v8"/></svg></span> Control de Stock
          <span class="badge hide" id="stockBadge">0</span></button>
        <button class="nav-item" data-view="recepcion" onclick="go('recepcion')">
          <span class="ico"><svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg></span> Recepción de Turbos
          <span class="badge hide" id="recBadge">0</span></button>
        <button class="nav-item" data-view="diario" onclick="go('diario')">
          <span class="ico"><svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></span> Libro Diario</button>
        <button class="nav-item" data-view="clientes" onclick="go('clientes')">
          <span class="ico"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span> Clientes</button>
      </div>

      <div class="nav-section">
        <div class="nav-label">ADMINISTRACIÓN</div>
        <button class="nav-item" data-view="proveedores" onclick="go('proveedores')">
          <span class="ico"><svg viewBox="0 0 24 24"><path d="M1 3h15v13H1z"/><path d="M16 8h4l3 3v5h-7z"/><circle cx="5.5" cy="18.5" r="2"/><circle cx="18.5" cy="18.5" r="2"/></svg></span> Proveedores</button>
        <button class="nav-item" data-view="gastos" onclick="go('gastos')">
          <span class="ico"><svg viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg></span> Gastos</button>
        <button class="nav-item" data-view="caja" onclick="go('caja')">
          <span class="ico"><svg viewBox="0 0 24 24"><path d="M12 1v22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></span> Caja</button>
        <button class="nav-item" data-view="resumen" onclick="go('resumen')">
          <span class="ico"><svg viewBox="0 0 24 24"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg></span> Resumen</button>
      </div>

      <div class="nav-section">
        <div class="nav-label">RUBROS</div>
        <button class="nav-item" data-view="stock" data-rubro="turbo" onclick="go('stock',{rubro:'turbo'})">
          <span class="ico"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/></svg></span> Turbos</button>
        <button class="nav-item" data-view="stock" data-rubro="lubricentro" onclick="go('stock',{rubro:'lubricentro'})">
          <span class="ico"><svg viewBox="0 0 24 24"><path d="M12 3s6 5.4 6 10a6 6 0 0 1-12 0c0-4.6 6-10 6-10z"/></svg></span> Lubricentro</button>
        <button class="nav-item" data-view="diario" data-rubro="turbo" onclick="go('diario',{rubro:'turbo'})">
          <span class="ico"><svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg></span> Repuestos Turbos</button>
        <button class="nav-item" data-view="diario" data-rubro="lubricentro" onclick="go('diario',{rubro:'lubricentro'})">
          <span class="ico"><svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></span> Diario Lubricentro</button>
      </div>

      <div class="sidebar-foot">
        <button class="nav-item" onclick="refrescar()">
          <span class="ico"><svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg></span> Actualizar datos</button>
        <button class="nav-item" data-view="config" onclick="go('config')"><span class="ico"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 0 1-4 0v-.1A1.6 1.6 0 0 0 7 19.4a1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0-1.1-2.7H1a2 2 0 0 1 0-4h.1A1.6 1.6 0 0 0 4.6 7a1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.8.3H9a1.6 1.6 0 0 0 1-1.5V1a2 2 0 0 1 4 0v.1a1.6 1.6 0 0 0 2.7 1.1l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8V7a1.6 1.6 0 0 0 1.5 1H23a2 2 0 0 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1z"/></svg></span> Configuración</button>
      </div>
    </aside>

    <!-- ===== Main ===== -->
    <main class="main">
      <div class="topbar">
        <button class="hamb" onclick="toggleSidebar()" aria-label="Menú">☰</button>
        <div class="search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <input placeholder="Buscar productos, ventas, clientes…">
        </div>
        <button class="btn sm" style="margin-left:auto" onclick="refrescar()" title="Traer los últimos cambios de otras PC">🔄 <span class="hide-mobile">Actualizar</span></button>
      </div>

      <div class="content" id="content"><!-- render dinámico --></div>
    </main>
    <div class="sb-backdrop" id="sbBackdrop" onclick="toggleSidebar()"></div>
  </div>

  <!-- ===== Modal + Toast ===== -->
  <div class="modal-back" id="modalBack"><div id="modalRoot"></div></div>
  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
